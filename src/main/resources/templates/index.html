<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator | Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .article-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .category-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 12px;
        }
        .category-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .category-scroll::-webkit-scrollbar-thumb {
            background-color: #dee2e6;
            border-radius: 10px;
        }
        .category-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .bookmark-btn { font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-globe2 me-2"></i>News Aggregator</a>
        <div class="d-flex align-items-center ms-auto">
            <form class="d-flex me-3" action="/" method="get">
                <input class="form-control me-2 rounded-pill" type="search" name="search" placeholder="Пошук новин..."
                       th:value="${search}" oninput="if(this.value === '') this.form.submit();">
                <button class="btn btn-outline-light rounded-pill" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <div id="auth-section">
                <button class="btn btn-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#authModal">Увійти</button>
            </div>
        </div>
    </div>
</nav>

<div class="bg-white shadow-sm mb-4">
    <div class="container pt-3">
        <div class="category-scroll">
            <a href="/" class="btn rounded-pill me-2" th:classappend="${category == null} ? 'btn-primary' : 'btn-outline-secondary'">
                <i class="bi bi-stars"></i> Всі новини
            </a>

            <a href="#" onclick="showBookmarks(event)" class="btn rounded-pill me-2 btn-outline-danger" id="btn-bookmarks" style="display: none;">
                <i class="bi bi-bookmark-heart-fill"></i> Мої закладки
            </a>

            <a th:each="cat : ${allCategories}"
               th:href="@{/(category=${cat.name})}"
               class="btn rounded-pill me-2"
               th:classappend="${category == cat.name} ? 'btn-primary' : 'btn-outline-secondary'">
                <i class="bi" th:classappend="${icons.get(cat.name) != null ? icons.get(cat.name) : 'bi-tag'}"></i>
                <span th:text="${cat.name}"></span>
            </a>
        </div>
    </div>
</div>

<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Акаунт</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-2">
                <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active rounded-pill fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">Вхід</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-pill fw-bold" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">Реєстрація</button>
                    </li>
                </ul>

                <div id="authError" class="alert alert-danger py-2 small" style="display: none;"></div>
                <div id="authSuccess" class="alert alert-success py-2 small" style="display: none;"></div>

                <div class="tab-content" id="authTabContent">
                    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label class="form-label text-muted small mb-1">Email</label>
                                <div class="input-group shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="loginEmail" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small mb-1">Пароль</label>
                                <div class="input-group shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="loginPassword" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 shadow-sm">Увійти</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register-pane" role="tabpanel">
                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="mb-3">
                                <label class="form-label text-muted small mb-1">Ім'я користувача</label>
                                <div class="input-group shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="regName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small mb-1">Email</label>
                                <div class="input-group shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="regEmail" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small mb-1">Пароль (мінімум 4 символи)</label>
                                <div class="input-group shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="regPassword" required minlength="4">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 shadow-sm" id="regBtn">Зареєструватися</button>
                        </form>

                        <form id="verifyForm" onsubmit="handleVerify(event)" style="display: none;">
                            <div class="text-center mb-3">
                                <i class="bi bi-envelope-paper-heart text-danger" style="font-size: 3rem;"></i>
                                <p class="mt-2 mb-0 fw-bold">Перевірте пошту!</p>
                                <p class="text-muted small">Код відправлено на <br> <span id="verifyEmailDisplay" class="fw-bold text-dark"></span></p>
                            </div>
                            <div class="mb-4">
                                <input type="text" class="form-control form-control-lg text-center fw-bold bg-light shadow-inner" id="verifyCode" placeholder="000000" maxlength="6" required autocomplete="off" style="letter-spacing: 12px; font-size: 1.8rem;">
                            </div>
                            <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow-sm" id="verifyBtn">Підтвердити Email</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="news-container">
        <div class="col" th:each="article : ${articles}">
            <div class="card h-100 article-card border-0 shadow-sm rounded-4 overflow-hidden">
                <img th:src="${article.imageUrl}" class="card-img-top" alt="News Image"
                     onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=600&q=80'">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-primary bg-opacity-10 text-primary mb-2 align-self-start rounded-pill"
                          th:text="${article.categoryName}">Категорія</span>
                    <h5 class="card-title fw-bold" th:text="${article.title}">Заголовок</h5>
                    <p class="card-text text-muted small" th:text="${#strings.abbreviate(article.content, 120)}">Опис...</p>

                    <div class="mt-auto d-flex justify-content-between align-items-center border-top pt-3">
                        <a th:href="${article.sourceUrl}" target="_blank" class="text-decoration-none fw-bold">Читати далі <i class="bi bi-arrow-right"></i></a>
                        <i class="bi bi-heart bookmark-btn text-danger"
                           th:onclick="'toggleBookmark(this, ' + ${article.id} + ')'"
                           style="display: none;"></i>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 text-muted small text-end pb-3">
                    <i class="bi bi-clock"></i> <span th:text="${#temporals.format(article.publishedAt, 'dd-MM-yyyy HH:mm')}">Дата</span>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-spinner" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    let currentPage = /*[[${currentPage}]]*/ 0;
    let totalPages = /*[[${totalPages}]]*/ 1;
    let searchParam = /*[[${search}]]*/ '';
    let categoryParam = /*[[${category}]]*/ '';
    let isLoading = false;
    let currentUser = null;
    let isShowingBookmarks = false;

    document.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem('userEmail');
        if (savedEmail) {
            loadUserProfile(savedEmail);
        }
    });

    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
            if (!isLoading && currentPage < totalPages - 1 && !isShowingBookmarks) loadNextPage();
        }
    });

    function loadNextPage() {
        isLoading = true;
        currentPage++;
        document.getElementById('loading-spinner').style.display = 'block';

        let url = `/api/articles?page=${currentPage}&size=12`;
        if (searchParam) url += `&search=${searchParam}`;
        if (categoryParam) url += `&category=${categoryParam}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-container');
                data.content.forEach(article => {
                    const defaultImg = "https://images.unsplash.com/photo-1495020689067-958852a7765e?w=600&q=80";
                    const imgUrl = article.imageUrl ? article.imageUrl : defaultImg;
                    const dateObj = new Date(article.publishedAt);
                    const formattedDate = dateObj.toLocaleDateString('uk-UA') + ' ' + dateObj.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    const catName = article.categoryName ? article.categoryName : 'Без категорії';
                    const contentStr = article.content.length > 120 ? article.content.substring(0, 120) + '...' : article.content;

                    let heartClass = 'bi-heart';
                    let displayStyle = currentUser ? 'block' : 'none';
                    if (currentUser && currentUser.savedArticles.some(saved => saved.id === article.id)) {
                        heartClass = 'bi-heart-fill';
                    }

                    const cardHtml = `
                        <div class="col" id="article-card-${article.id}">
                            <div class="card h-100 article-card border-0 shadow-sm rounded-4 overflow-hidden">
                                <img src="${imgUrl}" class="card-img-top" onerror="this.src='${defaultImg}'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary bg-opacity-10 text-primary mb-2 align-self-start rounded-pill">${catName}</span>
                                    <h5 class="card-title fw-bold">${article.title}</h5>
                                    <p class="card-text text-muted small">${contentStr}</p>

                                    <div class="mt-auto d-flex justify-content-between align-items-center border-top pt-3">
                                        <a href="${article.sourceUrl}" target="_blank" class="text-decoration-none fw-bold">Читати далі <i class="bi bi-arrow-right"></i></a>
                                        <i class="bi ${heartClass} bookmark-btn text-danger"
                                           onclick="toggleBookmark(this, ${article.id})"
                                           style="display: ${displayStyle};"></i>
                                    </div>
                                </div>
                                <div class="card-footer bg-white border-0 text-muted small text-end pb-3">
                                    <i class="bi bi-clock"></i> <span>${formattedDate}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
                isLoading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            });
    }

    function showAuthMsg(msg, isError = true) {
        const errDiv = document.getElementById('authError');
        const sucDiv = document.getElementById('authSuccess');
        if (isError) {
            sucDiv.style.display = 'none';
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        } else {
            errDiv.style.display = 'none';
            sucDiv.innerText = msg;
            sucDiv.style.display = 'block';
        }
    }

    document.getElementById('authModal').addEventListener('hidden.bs.modal', () => {
        document.getElementById('authError').style.display = 'none';
        document.getElementById('authSuccess').style.display = 'none';
        document.getElementById('loginForm').reset();
        document.getElementById('registerForm').reset();
        document.getElementById('verifyForm').reset();
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('verifyForm').style.display = 'none';
    });

    function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;

        fetch(`/api/users/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`, { method: 'POST' })
            .then(async res => {
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            })
            .then(user => {
                localStorage.setItem('userEmail', user.email);
                bootstrap.Modal.getInstance(document.getElementById('authModal')).hide();
                loadUserProfile(user.email);
            })
            .catch(err => {
                let msg = err.message;
                try { msg = JSON.parse(err.message).message; } catch(e) {}
                showAuthMsg(msg);
            });
    }

    let registeringEmail = "";
    function handleRegister(event) {
        event.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        const btn = document.getElementById('regBtn');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Відправка листа...';

        fetch(`/api/users/register?username=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`, { method: 'POST' })
            .then(async res => {
                if (!res.ok) throw new Error(await res.text());

                registeringEmail = email;
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('verifyEmailDisplay').innerText = email;
                document.getElementById('verifyForm').style.display = 'block';
                showAuthMsg("Лист з кодом відправлено!", false);
            })
            .catch(err => {
                let msg = err.message;
                try { msg = JSON.parse(err.message).message; } catch(e) {}
                showAuthMsg(msg);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Зареєструватися';
            });
    }

    function handleVerify(event) {
        event.preventDefault();
        const code = document.getElementById('verifyCode').value;
        const btn = document.getElementById('verifyBtn');

        btn.disabled = true;
        btn.innerText = 'Перевірка...';

        fetch(`/api/users/verify?email=${encodeURIComponent(registeringEmail)}&code=${encodeURIComponent(code)}`, { method: 'POST' })
            .then(async res => {
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            })
            .then(user => {
                localStorage.setItem('userEmail', user.email);
                bootstrap.Modal.getInstance(document.getElementById('authModal')).hide();
                loadUserProfile(user.email);
            })
            .catch(err => {
                let msg = err.message;
                try { msg = JSON.parse(err.message).message; } catch(e) {}
                showAuthMsg(msg);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Підтвердити Email';
            });
    }

    function loadUserProfile(email) {
        fetch(`/api/users/${email}`)
            .then(res => {
                if (!res.ok) {
                    localStorage.removeItem('userEmail');
                    throw new Error("Користувача не знайдено в базі");
                }
                return res.json();
            })
            .then(user => {
                currentUser = user;
                document.getElementById('btn-bookmarks').style.display = 'inline-block';
                document.getElementById('auth-section').innerHTML = `
                    <div class="dropdown">
                        <button class="btn btn-light rounded-pill dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> ${user.username}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><button class="dropdown-item text-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Вийти</button></li>
                        </ul>
                    </div>
                `;

                const savedIds = user.savedArticles.map(a => a.id);
                document.querySelectorAll('.bookmark-btn').forEach(btn => {
                    btn.style.display = 'block';
                    const articleId = parseInt(btn.getAttribute('onclick').match(/\d+/)[0]);
                    if (savedIds.includes(articleId)) {
                        btn.classList.remove('bi-heart');
                        btn.classList.add('bi-heart-fill');
                    } else {
                        btn.classList.remove('bi-heart-fill');
                        btn.classList.add('bi-heart');
                    }
                });
            })
            .catch(err => {
                console.warn("Помилка авторизації:", err.message);
                location.reload();
            });
    }

    function logout() { localStorage.removeItem('userEmail'); location.reload(); }

    function toggleBookmark(btnElement, articleId) {
        if (!currentUser) return;

        if (btnElement.classList.contains('bi-heart')) {
            btnElement.classList.remove('bi-heart');
            btnElement.classList.add('bi-heart-fill');
        } else {
            btnElement.classList.remove('bi-heart-fill');
            btnElement.classList.add('bi-heart');
        }

        fetch(`/api/users/${currentUser.email}/bookmarks/${articleId}`, { method: 'POST' })
            .catch(err => console.error("Помилка збереження", err));
    }

    function showBookmarks(event) {
        event.preventDefault();

        if (!currentUser) return;
        isShowingBookmarks = true;

        document.querySelectorAll('.category-scroll .btn').forEach(b => {
            b.classList.remove('btn-primary', 'btn-danger');
            b.classList.add('btn-outline-secondary');
        });
        event.currentTarget.classList.remove('btn-outline-secondary', 'btn-outline-danger');
        event.currentTarget.classList.add('btn-danger');

        const container = document.getElementById('news-container');
        document.getElementById('loading-spinner').style.display = 'none';

        container.innerHTML = '<div class="col-12 text-center my-5"><div class="spinner-border text-danger" role="status"></div></div>';

        fetch(`/api/users/${currentUser.email}`)
            .then(res => res.json())
            .then(updatedUser => {
                currentUser = updatedUser;
                container.innerHTML = '';

                if (currentUser.savedArticles.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 d-flex flex-column align-items-center justify-content-center my-5 py-5">
                            <i class="bi bi-journal-x text-muted" style="font-size: 4rem;"></i>
                            <h4 class="text-muted mt-3 fw-bold">У вас поки немає збережених новин</h4>
                            <p class="text-muted small">Додавайте новини до закладок, щоб прочитати їх пізніше.</p>
                        </div>`;
                    return;
                }

                currentUser.savedArticles.forEach(article => {
                    const defaultImg = "https://images.unsplash.com/photo-1495020689067-958852a7765e?w=600&q=80";
                    const imgUrl = article.imageUrl ? article.imageUrl : defaultImg;
                    const dateObj = new Date(article.publishedAt);
                    const formattedDate = dateObj.toLocaleDateString('uk-UA') + ' ' + dateObj.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    const catName = article.categoryName ? article.categoryName : 'Без категорії';
                    const contentStr = article.content.length > 120 ? article.content.substring(0, 120) + '...' : article.content;

                    const cardHtml = `
                        <div class="col" id="article-card-${article.id}">
                            <div class="card h-100 article-card border-0 shadow-sm rounded-4 overflow-hidden">
                                <img src="${imgUrl}" class="card-img-top" onerror="this.src='${defaultImg}'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary bg-opacity-10 text-primary mb-2 align-self-start rounded-pill">${catName}</span>
                                    <h5 class="card-title fw-bold">${article.title}</h5>
                                    <p class="card-text text-muted small">${contentStr}</p>

                                    <div class="mt-auto d-flex justify-content-between align-items-center border-top pt-3">
                                        <a href="${article.sourceUrl}" target="_blank" class="text-decoration-none fw-bold">Читати далі <i class="bi bi-arrow-right"></i></a>
                                        <i class="bi bi-heart-fill bookmark-btn text-danger"
                                           onclick="toggleBookmark(this, ${article.id}); removeCardFromBookmarks(${article.id})"
                                           style="display: block;"></i>
                                    </div>
                                </div>
                                <div class="card-footer bg-white border-0 text-muted small text-end pb-3">
                                    <i class="bi bi-clock"></i> <span>${formattedDate}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
            });
    }

    function removeCardFromBookmarks(articleId) {
        if (isShowingBookmarks) {
            const card = document.getElementById(`article-card-${articleId}`);
            if (card) {
                card.style.transition = "opacity 0.3s";
                card.style.opacity = "0";
                setTimeout(() => card.remove(), 300);
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator | Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover; /* Щоб картинки не розтягувалися, а красиво обрізалися */
        }
        .article-card {
            transition: transform 0.2s;
        }
        .article-card:hover {
            transform: translateY(-5px); /* Ефект підняття картки при наведенні */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🌍 News Aggregator</a>
        <form class="d-flex" action="/" method="get">
            <input class="form-control me-2" type="search" name="search" placeholder="Пошук новин..."
                   th:value="${search}">
            <button class="btn btn-outline-light" type="submit">Шукати</button>
        </form>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Останні новини <span th:if="${category}" th:text="'в категорії: ' + ${category}"
                                          class="text-primary"></span></h2>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="news-container">
        <div class="col" th:each="article : ${articles}">
            <div class="card h-100 article-card border-0 shadow-sm">
                <img th:src="${article.imageUrl}" class="card-img-top" alt="News Image"
                     onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">

                <div class="card-body d-flex flex-column">
                    <span class="badge bg-secondary mb-2 align-self-start"
                          th:text="${article.categoryName}">Категорія</span>

                    <h5 class="card-title fw-bold" th:text="${article.title}">Заголовок новини</h5>

                    <p class="card-text text-muted" th:text="${#strings.abbreviate(article.content, 100)}">Короткий опис
                        новини...</p>

                    <a th:href="${article.sourceUrl}" target="_blank" class="btn btn-primary mt-auto">Читати джерело
                        ➔</a>
                </div>
                <div class="card-footer bg-white text-muted small text-end">
                    Опубліковано: <span
                        th:text="${#temporals.format(article.publishedAt, 'dd-MM-yyyy HH:mm')}">Дата</span>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-spinner" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Завантаження...</span>
        </div>
    </div>

</div>
<script th:inline="javascript">
    let currentPage = /*[[${currentPage}]]*/ 0;
    let totalPages = /*[[${totalPages}]]*/ 1;
    let searchParam = /*[[${search}]]*/ '';
    let categoryParam = /*[[${category}]]*/ '';
    let isLoading = false;

    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
            if (!isLoading && currentPage < totalPages - 1) {
                loadNextPage();
            }
        }
    });

    function loadNextPage() {
        isLoading = true;
        currentPage++;
        document.getElementById('loading-spinner').style.display = 'block';

        let url = `/api/articles?page=${currentPage}&size=12`;
        if (searchParam) url += `&search=${searchParam}`;
        if (categoryParam) url += `&category=${categoryParam}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');

                data.content.forEach(article => {
                    const defaultImg = "https://via.placeholder.com/600x400?text=No+Image";
                    const imgUrl = article.imageUrl ? article.imageUrl : defaultImg;

                    const dateObj = new Date(article.publishedAt);
                    const formattedDate = dateObj.toLocaleDateString('uk-UA') + ' ' + dateObj.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});

                    const catName = article.categoryName ? article.categoryName : 'Без категорії';
                    const contentStr = article.content.length > 100 ? article.content.substring(0, 100) + '...' : article.content;

                    const cardHtml = `
                        <div class="col">
                            <div class="card h-100 article-card border-0 shadow-sm">
                                <img src="${imgUrl}" class="card-img-top" alt="News" onerror="this.src='${defaultImg}'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-secondary mb-2 align-self-start">${catName}</span>
                                    <h5 class="card-title fw-bold">${article.title}</h5>
                                    <p class="card-text text-muted">${contentStr}</p>
                                    <a href="${article.sourceUrl}" target="_blank" class="btn btn-primary mt-auto">Читати джерело ➔</a>
                                </div>
                                <div class="card-footer bg-white text-muted small text-end">
                                    Опубліковано: <span>${formattedDate}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });

                isLoading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            })
            .catch(error => {
                console.error('Помилка завантаження:', error);
                isLoading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator | Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .article-card {
            transition: transform 0.2s;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🌍 News Aggregator</a>

        <div class="d-flex align-items-center ms-auto">
            <form class="d-flex me-3" action="/" method="get">
                <input class="form-control me-2" type="search" name="search" placeholder="Пошук новин..." th:value="${search}">
                <button class="btn btn-outline-light" type="submit">Шукати</button>
            </form>

            <div id="auth-section">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#authModal">Увійти</button>
            </div>
        </div>
    </div>
</nav>

<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Вхід у News Aggregator</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Ваш Email</label>
                    <input type="email" class="form-control" id="userEmailInput" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Ваше Ім'я (для нових користувачів)</label>
                    <input type="text" class="form-control" id="userNameInput" placeholder="John Doe">
                </div>
                <div id="authError" class="text-danger small mb-2" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-primary" onclick="handleAuth()">Увійти / Зареєструватися</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="mb-4">Останні новини <span th:if="${category}" th:text="'в категорії: ' + ${category}" class="text-primary"></span></h2>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="news-container">
        <div class="col" th:each="article : ${articles}">
            <div class="card h-100 article-card border-0 shadow-sm">
                <img th:src="${article.imageUrl}" class="card-img-top" alt="News Image"
                     onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">

                <div class="card-body d-flex flex-column">
                    <span class="badge bg-secondary mb-2 align-self-start" th:text="${article.categoryName}">Категорія</span>
                    <h5 class="card-title fw-bold" th:text="${article.title}">Заголовок новини</h5>
                    <p class="card-text text-muted" th:text="${#strings.abbreviate(article.content, 100)}">Короткий опис новини...</p>

                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <a th:href="${article.sourceUrl}" target="_blank" class="btn btn-primary btn-sm">Читати ➔</a>
                        <button class="btn btn-outline-danger btn-sm bookmark-btn"
                                th:onclick="'toggleBookmark(this, ' + ${article.id} + ')'"
                                style="display: none;">🤍</button>
                    </div>
                </div>
                <div class="card-footer bg-white text-muted small text-end">
                    Опубліковано: <span th:text="${#temporals.format(article.publishedAt, 'dd-MM-yyyy HH:mm')}">Дата</span>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-spinner" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Завантаження...</span>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    // --- ЗМІННІ ДЛЯ ПАГІНАЦІЇ ---
    let currentPage = /*[[${currentPage}]]*/ 0;
    let totalPages = /*[[${totalPages}]]*/ 1;
    let searchParam = /*[[${search}]]*/ '';
    let categoryParam = /*[[${category}]]*/ '';
    let isLoading = false;
    let currentUser = null; // Поточний користувач

    // --- АВТОРИЗАЦІЯ ПРИ ЗАВАНТАЖЕННІ ---
    document.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem('userEmail');
        if (savedEmail) {
            loadUserProfile(savedEmail);
        }
    });

    // --- ЛОГІКА БЕЗКІНЕЧНОЇ ПРОКРУТКИ ---
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
            if (!isLoading && currentPage < totalPages - 1) {
                loadNextPage();
            }
        }
    });

    function loadNextPage() {
        isLoading = true;
        currentPage++;
        document.getElementById('loading-spinner').style.display = 'block';

        let url = `/api/articles?page=${currentPage}&size=12`;
        if (searchParam) url += `&search=${searchParam}`;
        if (categoryParam) url += `&category=${categoryParam}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');

                data.content.forEach(article => {
                    const defaultImg = "https://via.placeholder.com/600x400?text=No+Image";
                    const imgUrl = article.imageUrl ? article.imageUrl : defaultImg;

                    const dateObj = new Date(article.publishedAt);
                    const formattedDate = dateObj.toLocaleDateString('uk-UA') + ' ' + dateObj.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});

                    const catName = article.categoryName ? article.categoryName : 'Без категорії';
                    const contentStr = article.content.length > 100 ? article.content.substring(0, 100) + '...' : article.content;

                    // Якщо користувач залогінений і ця новина є в його закладках - показуємо червоне сердечко
                    let heartIcon = '🤍';
                    let displayStyle = currentUser ? 'block' : 'none';
                    if (currentUser && currentUser.savedArticles.some(saved => saved.id === article.id)) {
                        heartIcon = '❤️';
                    }

                    const cardHtml = `
                        <div class="col">
                            <div class="card h-100 article-card border-0 shadow-sm">
                                <img src="${imgUrl}" class="card-img-top" alt="News" onerror="this.src='${defaultImg}'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-secondary mb-2 align-self-start">${catName}</span>
                                    <h5 class="card-title fw-bold">${article.title}</h5>
                                    <p class="card-text text-muted">${contentStr}</p>

                                    <div class="mt-auto d-flex justify-content-between align-items-center">
                                        <a href="${article.sourceUrl}" target="_blank" class="btn btn-primary btn-sm">Читати ➔</a>
                                        <button class="btn btn-outline-danger btn-sm bookmark-btn"
                                                onclick="toggleBookmark(this, ${article.id})"
                                                style="display: ${displayStyle};">${heartIcon}</button>
                                    </div>
                                </div>
                                <div class="card-footer bg-white text-muted small text-end">
                                    Опубліковано: <span>${formattedDate}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });

                isLoading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            })
            .catch(error => {
                console.error('Помилка завантаження:', error);
                isLoading = false;
                document.getElementById('loading-spinner').style.display = 'none';
            });
    }

    // --- ЛОГІКА АВТОРИЗАЦІЇ ТА ЗАКЛАДОК ---
    function handleAuth() {
        const email = document.getElementById('userEmailInput').value;
        const name = document.getElementById('userNameInput').value || 'User';
        const errorDiv = document.getElementById('authError');

        if (!email) {
            errorDiv.innerText = "Введіть Email!";
            errorDiv.style.display = 'block';
            return;
        }

        fetch(`/api/users/${email}`)
            .then(res => {
                if (res.ok) return res.json();
                return fetch(`/api/users/register?username=${name}&email=${email}`, { method: 'POST' }).then(r => r.json());
            })
            .then(user => {
                localStorage.setItem('userEmail', user.email);
                const modal = bootstrap.Modal.getInstance(document.getElementById('authModal'));
                modal.hide();
                loadUserProfile(user.email);
            })
            .catch(err => {
                errorDiv.innerText = "Помилка авторизації!";
                errorDiv.style.display = 'block';
            });
    }

    function loadUserProfile(email) {
        fetch(`/api/users/${email}`)
            .then(res => res.json())
            .then(user => {
                currentUser = user;
                document.getElementById('auth-section').innerHTML = `
                    <span class="text-light me-3">👤 ${user.username}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="logout()">Вийти</button>
                `;

                const savedIds = user.savedArticles.map(a => a.id);
                document.querySelectorAll('.bookmark-btn').forEach(btn => {
                    btn.style.display = 'block';
                    const articleId = parseInt(btn.getAttribute('onclick').match(/\d+/)[0]);
                    if (savedIds.includes(articleId)) {
                        btn.innerText = '❤️';
                    } else {
                        btn.innerText = '🤍';
                    }
                });
            });
    }

    function logout() {
        localStorage.removeItem('userEmail');
        location.reload();
    }

    function toggleBookmark(btnElement, articleId) {
        if (!currentUser) return;

        fetch(`/api/users/${currentUser.email}/bookmarks/${articleId}`, { method: 'POST' })
            .then(() => {
                if (btnElement.innerText === '🤍') {
                    btnElement.innerText = '❤️';
                    // Оновлюємо локальний стан
                    currentUser.savedArticles.push({id: articleId});
                } else {
                    btnElement.innerText = '🤍';
                    // Оновлюємо локальний стан
                    currentUser.savedArticles = currentUser.savedArticles.filter(a => a.id !== articleId);
                }
            })
            .catch(err => console.error("Помилка збереження закладки", err));
    }
</script>
</body>
</html>
